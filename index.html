<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Quieres salir conmigo, Silvana?</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #ffeef8;
            text-align: center;
        }

        h1 {
            color: #d1105a;
            font-size: 2.5rem;
            margin-bottom: 30px;
            padding: 0 20px;
        }

        .contenedor-botones {
            position: relative;
            display: flex;
            gap: 30px;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 400px;
            height: 100px;
        }

        button {
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #btn-si {
            background-color: #4caf50;
            color: white;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
        }

        #btn-si:hover {
            transform: scale(1.1);
        }

        #btn-no {
            background-color: #f44336;
            color: white;
            position: absolute; /* Permite que se mueva por la pantalla */
            box-shadow: 0 4px 15px rgba(244, 67, 54, 0.4);
            user-select: none;
        }
    </style>
</head>
<body>

    <h1 id="pregunta">Silvana, ¿te gustaría salir conmigo? ✨</h1>

    <div class="contenedor-botones">
        <button id="btn-si">¡Sí, claro! 🤠</button>
        <button id="btn-no">No 💔</button>
    </div>

   <script>
        const btnNo = document.getElementById('btn-no');
        const btnSi = document.getElementById('btn-si');
        const pregunta = document.getElementById('pregunta');

        // Función mejorada para que el botón NO se vaya tan lejos
        function moverBotonNo() {
            // Definimos un radio máximo de movimiento (en píxeles) para que se quede cerca
            const rangoMaximo = 120; 

            // Generamos un movimiento aleatorio pero controlado (puede ser positivo o negativo)
            const randomX = (Math.random() - 0.5) * 2 * rangoMaximo;
            const randomY = (Math.random() - 0.5) * 2 * rangoMaximo;

            // Aplicamos el movimiento usando transform para que sea más fluido y no rompa el diseño
            btnNo.style.transform = `translate(${randomX}px, ${randomY}px)`;
        }

        // Se activa al pasar el cursor (Computadoras)
        btnNo.addEventListener('mouseenter', moverBotonNo);

        // Se activa al intentar tocarlo (Celulares)
        btnNo.addEventListener('touchstart', (e) => {
            e.preventDefault(); 
            moverBotonNo();
        });

    
        // Lo que pasa cuando por fin le da clic al botón "Sí"
        btnSi.addEventListener('click', () => {
            pregunta.innerHTML = "¡Esoooo! Sabía que dirías que sí, Silvana. 🥳 Te veo el viernes para ir a las luchas!🥊❣💥.";
            btnNo.style.display = 'none';
            btnSi.style.display = 'none';
        });
    </script>

</body>
</html>
